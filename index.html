<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milano Holo-Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="space-console">
        <div class="holo-header">
            <h1>✧ MILANO DECK AUDIO ✧</h1>
            <div class="star-tracker"></div>
        </div>
        
        <div class="holo-panel">
            <div class="input-group">
                <label>⟪ FREQUENCY_LINK ⟫</label>
                <input type="text" id="streamUrl" placeholder="Inserisci coordinate audio...">
            </div>

            <div class="controls">
                <button id="playBtn" class="btn-ravager">IGNITE</button>
                <button id="stopBtn" class="btn-void">CUT OFF</button>
            </div>

            <div class="volume-container">
                <label>⟪ BOOST ⟫</label>
                <input type="range" id="volumeCtrl" min="0" max="1" step="0.05" value="0.5">
            </div>

            <div class="status-bar" id="statusDisplay">AWAITING TRANSMISSION...</div>
            <audio id="audioElement" preload="none"></audio>
        </div>

        <div class="holo-panel">
            <h2>✧ ADD_WAYPOINT ✧</h2>
            <div class="input-group">
                <label>⟪ TRACK_NAME ⟫</label>
                <input type="text" id="stationName" placeholder="Nome frequenza spaziale...">
            </div>
            <button id="saveDbBtn" class="btn-nova">SAVE TO GALAXY DRIVE</button>
        </div>

        <div class="drawer-section">
            <h2>✧ SAVED_FREQUENCIES ✧</h2>
            <div id="savedRadiosContainer" class="holo-drawer">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
