<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE RADIO TERMINAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">
            <h1>// N.C.P.D. AUDIO ARCHIVE_</h1>
            <div class="status-indicator"></div>
        </div>
        
        <div class="panel">
            <div class="input-group">
                <label>STREAM_URL:</label>
                <input type="text" id="streamUrl" placeholder="Inserisci indirizzo stream protetto...">
            </div>

            <div class="controls">
                <button id="playBtn" class="btn-primary">INITIATE_PLAY</button>
                <button id="stopBtn" class="btn-danger">ABORT</button>
            </div>

            <div class="volume-container">
                <label>SYS_VOL:</label>
                <input type="range" id="volumeCtrl" min="0" max="1" step="0.05" value="0.5">
            </div>

            <div class="status-bar" id="statusDisplay">SYSTEM READY. AWAITING INPUT.</div>
            <audio id="audioElement" preload="none"></audio>
        </div>

        <div class="panel">
            <h2>// NEW_ENTRY_</h2>
            <div class="input-group">
                <label>FILE_NAME:</label>
                <input type="text" id="stationName" placeholder="Identificativo stream...">
            </div>
            <button id="saveDbBtn" class="btn-secondary">UPLOAD_TO_MAINFRAME</button>
        </div>

        <div class="drawer-section">
            <h2>// SECURE_FILES_DRAWER</h2>
            <div id="savedRadiosContainer" class="file-drawer">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
